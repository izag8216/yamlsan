<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#56e39f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="12" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#00d2ff"/>
    </pattern>
    <rect width="800" height="220" fill="url(#dots)"/>
  </g>

  <!-- Left panel: YAML document visualization -->
  <g transform="translate(50, 30)">
    <!-- Document card -->
    <rect x="0" y="0" width="200" height="160" rx="8" fill="#0d1b2a" stroke="#1b3a5c" stroke-width="1.5" opacity="0.9"/>

    <!-- Frontmatter delimiter (---) -->
    <text x="20" y="30" font-family="monospace" font-size="13" fill="#00d2ff" filter="url(#softglow)">---</text>

    <!-- YAML key-value lines -->
    <text x="20" y="55" font-family="monospace" font-size="11" fill="#7ec8e3">title:</text>
    <text x="70" y="55" font-family="monospace" font-size="11" fill="#56e39f">"My Page"</text>

    <text x="20" y="75" font-family="monospace" font-size="11" fill="#7ec8e3">date:</text>
    <text x="60" y="75" font-family="monospace" font-size="11" fill="#56e39f">2026-04-20</text>

    <text x="20" y="95" font-family="monospace" font-size="11" fill="#7ec8e3">tags:</text>
    <text x="60" y="95" font-family="monospace" font-size="11" fill="#56e39f">[cli, yaml]</text>

    <text x="20" y="115" font-family="monospace" font-size="11" fill="#7ec8e3">status:</text>
    <text x="75" y="115" font-family="monospace" font-size="11" fill="#56e39f">draft</text>

    <!-- Frontmatter end delimiter -->
    <text x="20" y="140" font-family="monospace" font-size="13" fill="#00d2ff" filter="url(#softglow)">---</text>

    <!-- Scan line animation hint -->
    <line x1="0" y1="55" x2="200" y2="55" stroke="url(#accent2)" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Shield/Check icon -->
  <g transform="translate(280, 45)" filter="url(#glow)">
    <!-- Shield shape -->
    <path d="M40 0 L80 20 L80 60 Q80 100 40 120 Q0 100 0 60 L0 20 Z"
          fill="none" stroke="url(#accent2)" stroke-width="3"/>
    <!-- Inner shield -->
    <path d="M40 10 L70 25 L70 55 Q70 88 40 105 Q10 88 10 55 L10 25 Z"
          fill="#0d1b2a" stroke="url(#accent2)" stroke-width="1" opacity="0.6"/>
    <!-- Checkmark -->
    <path d="M25 55 L37 70 L58 40" fill="none" stroke="#56e39f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="400" y="72" font-family="sans-serif" font-weight="bold" font-size="48" fill="#ffffff" letter-spacing="2">yamlsan</text>

  <!-- Subtitle -->
  <text x="400" y="105" font-family="sans-serif" font-size="16" fill="#7ec8e3" letter-spacing="1">YAML Frontmatter Schema Validator</text>

  <!-- Feature pills -->
  <g transform="translate(400, 125)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#16213e" stroke="#1b3a5c" stroke-width="1"/>
    <text x="40" y="16" font-family="monospace" font-size="10" fill="#00d2ff" text-anchor="middle">validate</text>

    <rect x="90" y="0" width="60" height="24" rx="12" fill="#16213e" stroke="#1b3a5c" stroke-width="1"/>
    <text x="120" y="16" font-family="monospace" font-size="10" fill="#56e39f" text-anchor="middle">fix</text>

    <rect x="160" y="0" width="50" height="24" rx="12" fill="#16213e" stroke="#1b3a5c" stroke-width="1"/>
    <text x="185" y="16" font-family="monospace" font-size="10" fill="#7ec8e3" text-anchor="middle">CI</text>

    <rect x="220" y="0" width="110" height="24" rx="12" fill="#16213e" stroke="#1b3a5c" stroke-width="1"/>
    <text x="275" y="16" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">zero API deps</text>
  </g>

  <!-- Bottom accent line -->
  <line x1="50" y1="205" x2="750" y2="205" stroke="url(#accent2)" stroke-width="2" opacity="0.5"/>
</svg>
